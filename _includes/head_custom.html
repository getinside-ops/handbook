<!-- Google Fonts: Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ============================================================
   0. DESIGN TOKENS
   ============================================================ */
:root {
  --gi-accent:        #6366f1;
  --gi-accent-hover:  #4f46e5;
  --gi-accent-light:  #eef2ff;
  --gi-accent-glow:   rgba(99, 102, 241, 0.25);
  --gi-text:          #1e1b4b;
  --gi-text-muted:    #6b7280;
  --gi-bg:            #f0f4ff;
  --gi-glass-bg:      rgba(255, 255, 255, 0.72);
  --gi-glass-bg-card: rgba(255, 255, 255, 0.80);
  --gi-glass-border:  rgba(255, 255, 255, 0.55);
  --gi-blur:          blur(16px);
  --gi-blur-sidebar:  blur(20px);
  --gi-blur-sm:       blur(8px);
  --gi-border:        rgba(99, 102, 241, 0.14);
  --link-color:       #6366f1;
  --gi-shadow-card:   0 4px 24px rgba(99, 102, 241, 0.10), 0 1px 4px rgba(0,0,0,0.06);
  --gi-shadow-hover:  0 8px 32px rgba(99, 102, 241, 0.18), 0 2px 8px rgba(0,0,0,0.08);
  /* legacy aliases so any inline var(--gi-*) still resolves */
  --gi-white:         #ffffff;
  --gi-btn-dark:      #6366f1;
  --gi-btn-light:     #eef2ff;
}


/* ============================================================
   1. TYPOGRAPHY — Inter
   ============================================================ */
html, body, .main-content, .side-bar, .site-nav,
input, button, select, textarea {
  font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
}

h1, h2, h3, h4, h5, h6 {
  letter-spacing: -0.02em;
  color: var(--gi-text);
}

/* H2 — accent underline accent bar */
.main-content h2 {
  padding-bottom: 0.45em;
  border-bottom: 2px solid var(--gi-accent-light);
  position: relative;
}
.main-content h2::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 3rem;
  height: 2px;
  background: var(--gi-accent);
  border-radius: 2px;
}

p, li, td, th { color: var(--gi-text); }

/* Inline links */
a:not(.btn):not(.nav-list-link):not(#back-to-top) {
  color: var(--gi-accent);
  text-decoration-color: rgba(99, 102, 241, 0.35);
  text-underline-offset: 2px;
  transition: color 0.15s ease, text-decoration-color 0.15s ease;
}
a:not(.btn):not(.nav-list-link):not(#back-to-top):hover {
  color: var(--gi-accent-hover);
  text-decoration-color: var(--gi-accent-hover);
}


/* ============================================================
   2. PAGE BACKGROUND — dot-grid + radial light orbs
   ============================================================ */
body, html {
  margin: 0 !important;
  padding: 0 !important;
  background-color: var(--gi-bg) !important;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 0%,  rgba(165, 180, 252, 0.30) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 90%, rgba(196, 181, 253, 0.25) 0%, transparent 55%),
    radial-gradient(circle, rgba(99, 102, 241, 0.07) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 22px 22px;
  background-attachment: fixed;
  color: var(--gi-text) !important;
}
@media (max-width: 768px) {
  body, html { background-attachment: scroll; }
}

.main-content, .main-content-wrap {
  background: transparent !important;
}


/* ============================================================
   3. SIDEBAR — frosted glass
   ============================================================ */
.side-bar {
  background: var(--gi-glass-bg) !important;
  backdrop-filter: var(--gi-blur-sidebar) !important;
  -webkit-backdrop-filter: var(--gi-blur-sidebar) !important;
  border-right: 1px solid var(--gi-glass-border) !important;
  box-shadow: 2px 0 16px rgba(99, 102, 241, 0.07) !important;
}

.site-nav {
  background: transparent !important;
  border-right: none !important;
}

.site-logo img {
  max-height: 32px;
  width: auto;
}

.site-title {
  font-weight: 700 !important;
  letter-spacing: -0.03em;
  color: var(--gi-text) !important;
}


/* ============================================================
   4. NAVIGATION LINKS
   ============================================================ */
.nav-list-link {
  color: var(--gi-text-muted) !important;
  border-radius: 8px !important;
  padding: 6px 12px !important;
  margin: 1px 6px !important;
  font-size: 0.875rem !important;
  font-weight: 400 !important;
  transition: background-color 0.15s ease, color 0.15s ease !important;
}

.nav-list-link:hover {
  background-color: rgba(99, 102, 241, 0.08) !important;
  color: var(--gi-accent) !important;
  text-decoration: none !important;
}

.nav-list-link.active {
  font-weight: 600 !important;
  background-color: var(--gi-accent-light) !important;
  background-image: none !important;
  color: var(--gi-accent) !important;
  border-left: 3px solid var(--gi-accent) !important;
  padding-left: 9px !important;
}

.aux-links a {
  color: var(--gi-text-muted) !important;
  font-size: 0.8125rem !important;
  transition: color 0.15s ease !important;
}
.aux-links a:hover {
  color: var(--gi-accent) !important;
  text-decoration: none !important;
}


/* ============================================================
   5. SEARCH — embedded in the frosted header
   ============================================================ */
.search-input {
  background-color: rgba(255, 255, 255, 0.45) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  border: 1px solid rgba(99, 102, 241, 0.18) !important;
  color: var(--gi-text) !important;
  border-radius: 8px !important;
  padding-left: 14px !important;
  padding-right: 14px !important;
  box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05) !important;
  transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease !important;
  font-size: 0.875rem !important;
}
.search-input:focus {
  border-color: var(--gi-accent) !important;
  background-color: rgba(255, 255, 255, 0.80) !important;
  outline: none !important;
  box-shadow: 0 0 0 3px var(--gi-accent-glow) !important;
}
.search-input::placeholder { color: var(--gi-text-muted) !important; }


/* ============================================================
   6. HEADER BARS — full-width frosted glass strip
   ============================================================ */

/* Mobile top bar (logo + hamburger) */
.site-header {
  background: var(--gi-glass-bg) !important;
  backdrop-filter: var(--gi-blur-sidebar) !important;
  -webkit-backdrop-filter: var(--gi-blur-sidebar) !important;
  border-bottom: 1px solid var(--gi-glass-border) !important;
}

/* Desktop top strip: search + aux-links
   Just-the-Docs uses .page-header or #main-header depending on version */
.page-header,
#main-header,
.main-header {
  background: var(--gi-glass-bg) !important;
  backdrop-filter: var(--gi-blur-sidebar) !important;
  -webkit-backdrop-filter: var(--gi-blur-sidebar) !important;
  border-bottom: 1px solid var(--gi-glass-border) !important;
  box-shadow: 0 2px 12px rgba(99, 102, 241, 0.06) !important;
  position: sticky !important;
  top: 0 !important;
  z-index: 500 !important;
}


/* ============================================================
   7. BUTTONS
   ============================================================ */
.btn {
  font-family: 'Inter', sans-serif !important;
  font-weight: 500 !important;
  border-radius: 8px !important;
  transition: box-shadow 0.2s ease, background-color 0.15s ease, transform 0.15s ease !important;
  letter-spacing: 0 !important;
}

.btn-primary {
  background-color: var(--gi-accent) !important;
  border-color: var(--gi-accent) !important;
  color: #ffffff !important;
  box-shadow: 0 2px 8px var(--gi-accent-glow) !important;
}
.btn-primary:hover {
  background-color: var(--gi-accent-hover) !important;
  border-color: var(--gi-accent-hover) !important;
  color: #ffffff !important;
  box-shadow: 0 4px 18px rgba(99, 102, 241, 0.40) !important;
  transform: translateY(-1px) !important;
}

.btn-outline {
  background-color: transparent !important;
  border: 1.5px solid var(--gi-border) !important;
  color: var(--gi-accent) !important;
}
.btn-outline:hover {
  background-color: var(--gi-accent-light) !important;
  border-color: var(--gi-accent) !important;
  color: var(--gi-accent-hover) !important;
}

.btn:not(.btn-primary):not(.btn-outline) {
  background-color: rgba(255, 255, 255, 0.90) !important;
  border: 1px solid var(--gi-border) !important;
  color: var(--gi-text) !important;
}
.btn:not(.btn-primary):not(.btn-outline):hover {
  background-color: var(--gi-accent-light) !important;
  border-color: var(--gi-accent) !important;
  color: var(--gi-accent) !important;
}


/* ============================================================
   8. CARDS — glassmorphism
   ============================================================ */
.gi-card {
  background: var(--gi-glass-bg-card) !important;
  backdrop-filter: var(--gi-blur) !important;
  -webkit-backdrop-filter: var(--gi-blur) !important;
  border: 1px solid var(--gi-glass-border) !important;
  border-radius: 14px !important;
  padding: 24px;
  display: flex !important;
  flex-direction: column !important;
  box-shadow: var(--gi-shadow-card) !important;
  transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease !important;
}
.gi-card:hover {
  box-shadow: var(--gi-shadow-hover) !important;
  transform: translateY(-3px) !important;
  border-color: rgba(99, 102, 241, 0.28) !important;
}


/* ============================================================
   9. CALLOUTS
   ============================================================ */
.gi-callout {
  padding: 16px 20px;
  border-radius: 8px;
  margin: 20px 0;
  border-left: 4px solid;
  backdrop-filter: var(--gi-blur-sm);
  -webkit-backdrop-filter: var(--gi-blur-sm);
}
.gi-callout.info    { background: rgba(238,242,255,0.85); border-color: var(--gi-accent); color: #3730a3; }
.gi-callout.success { background: rgba(240,253,244,0.85); border-color: #10b981; color: #065f46; }
.gi-callout.warning { background: rgba(255,251,235,0.85); border-color: #f59e0b; color: #78350f; }
.gi-callout.danger  { background: rgba(255,241,242,0.85); border-color: #f43f5e; color: #881337; }
.gi-callout p:last-child { margin-bottom: 0; }


/* ============================================================
   10. TABLES — glass rows + accent header
   ============================================================ */
.main-content table {
  border-collapse: separate !important;
  border-spacing: 0 !important;
  border-radius: 10px !important;
  overflow: hidden !important;
  box-shadow: var(--gi-shadow-card) !important;
  width: 100% !important;
  font-size: 0.875rem !important;
}
.main-content table thead tr { background: var(--gi-accent-light) !important; }
.main-content table thead th {
  color: var(--gi-accent-hover) !important;
  font-weight: 600 !important;
  font-size: 0.8125rem !important;
  letter-spacing: 0.03em !important;
  text-transform: uppercase !important;
  padding: 12px 16px !important;
  border-bottom: 2px solid rgba(99,102,241,0.20) !important;
}
.main-content table tbody tr {
  background: rgba(255,255,255,0.70) !important;
  transition: background 0.15s ease !important;
}
.main-content table tbody tr:hover { background: rgba(238,242,255,0.90) !important; }
.main-content table td {
  padding: 10px 16px !important;
  border-bottom: 1px solid rgba(99,102,241,0.08) !important;
  color: var(--gi-text) !important;
  vertical-align: top !important;
}
.main-content table tbody tr:last-child td { border-bottom: none !important; }


/* ============================================================
   11. CODE BLOCKS
   ============================================================ */
.main-content code, .main-content pre {
  font-size: 0.875em !important;
  border-radius: 6px !important;
}
.main-content pre {
  background: rgba(238,242,255,0.70) !important;
  backdrop-filter: var(--gi-blur-sm) !important;
  -webkit-backdrop-filter: var(--gi-blur-sm) !important;
  border: 1px solid var(--gi-border) !important;
}
.main-content :not(pre) > code {
  background: var(--gi-accent-light) !important;
  color: var(--gi-accent-hover) !important;
  border: 1px solid rgba(99,102,241,0.18) !important;
  padding: 2px 6px !important;
}


/* ============================================================
   12. JUST-THE-DOCS UTILITY CLASS OVERRIDES
   ============================================================ */
.text-purple-200  { color: #6366f1 !important; }
.text-purple-100  { color: #818cf8 !important; }
.text-blue-200    { color: #3b82f6 !important; }
.text-green-200   { color: #059669 !important; }
.text-grey-dk-000 { color: #6b7280 !important; }
.text-red-100     { color: #e11d48 !important; }
.bg-grey-lt-000 {
  background: rgba(238,242,255,0.55) !important;
  backdrop-filter: var(--gi-blur-sm) !important;
  -webkit-backdrop-filter: var(--gi-blur-sm) !important;
}

.label {
  background: var(--gi-accent-light) !important;
  color: var(--gi-accent) !important;
  border-radius: 6px !important;
}
blockquote, .note {
  background: rgba(238,242,255,0.60) !important;
  backdrop-filter: var(--gi-blur-sm) !important;
  -webkit-backdrop-filter: var(--gi-blur-sm) !important;
  border-left: 4px solid var(--gi-accent) !important;
  border-radius: 0 8px 8px 0 !important;
}


/* ============================================================
   13. BACK TO TOP
   ============================================================ */
#back-to-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: var(--gi-accent);
  color: #fff !important;
  width: 42px;
  height: 42px;
  text-align: center;
  line-height: 42px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
  z-index: 1000;
  font-size: 20px;
  box-shadow: 0 4px 14px var(--gi-accent-glow);
  text-decoration: none !important;
  transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
}
#back-to-top:hover {
  background: var(--gi-accent-hover);
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(99,102,241,0.45);
}


/* ============================================================
   14. SCROLLBAR — thin, accent-tinted
   ============================================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(99,102,241,0.30);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.55); }


/* ============================================================
   15. FOOTER
   ============================================================ */
footer.text-grey-dk-000,
footer .text-grey-dk-000 { color: var(--gi-text-muted) !important; }


/* ============================================================
   16. SMOOTH SCROLL + STICKY HEADER ANCHOR OFFSET
   ============================================================ */
html {
  scroll-behavior: smooth;
  scroll-padding-top: 70px;
}


/* ============================================================
   17. SEARCH RESULTS DROPDOWN
   ============================================================ */
.search-results {
  background: var(--gi-glass-bg-card) !important;
  backdrop-filter: var(--gi-blur) !important;
  -webkit-backdrop-filter: var(--gi-blur) !important;
  border: 1px solid var(--gi-glass-border) !important;
  border-radius: 12px !important;
  box-shadow: var(--gi-shadow-hover) !important;
  overflow: hidden !important;
  margin-top: 4px !important;
}
.search-result {
  border-bottom: 1px solid rgba(99, 102, 241, 0.08) !important;
  transition: background 0.15s ease !important;
}
.search-result:last-child { border-bottom: none !important; }
.search-result:hover,
.search-result.active { background: var(--gi-accent-light) !important; }
.search-result-title {
  color: var(--gi-text-muted) !important;
  font-size: 0.75rem !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
}
.search-result-doc-title {
  color: var(--gi-accent) !important;
  font-weight: 600 !important;
}
.search-result-rel-url { color: var(--gi-text-muted) !important; font-size: 0.75rem !important; }
.search-result-preview { color: var(--gi-text-muted) !important; font-size: 0.8125rem !important; }
/* Highlight matched keyword in results */
mark {
  background: var(--gi-accent-light) !important;
  color: var(--gi-accent-hover) !important;
  border-radius: 3px !important;
  padding: 0 2px !important;
}


/* ============================================================
   18. RIGHT-SIDE TOC (tocbot)
   ============================================================ */
.toc-list {
  list-style: none !important;
  padding-left: 0 !important;
  margin: 0 !important;
}
.toc-list .toc-list { padding-left: 12px !important; }
.toc-list-link {
  display: block !important;
  color: var(--gi-text-muted) !important;
  font-size: 0.8125rem !important;
  text-decoration: none !important;
  padding: 4px 8px !important;
  border-radius: 6px !important;
  line-height: 1.4 !important;
  transition: color 0.15s ease, background-color 0.15s ease !important;
}
.toc-list-link:hover {
  color: var(--gi-accent) !important;
  background: rgba(99, 102, 241, 0.07) !important;
  text-decoration: none !important;
}
.toc-list-link.is-active-link {
  color: var(--gi-accent) !important;
  font-weight: 600 !important;
  background: var(--gi-accent-light) !important;
}


/* ============================================================
   19. PAGE FADE-IN + CONTENT IMAGES + DEFINITION LISTS
   ============================================================ */
@keyframes giPageFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: no-preference) {
  .main-content { animation: giPageFadeIn 0.4s ease forwards; }
}

.main-content img {
  border-radius: 10px !important;
  box-shadow: var(--gi-shadow-card) !important;
  max-width: 100% !important;
  height: auto !important;
}

.main-content dl { margin: 16px 0 !important; }
.main-content dt {
  font-weight: 600 !important;
  color: var(--gi-accent-hover) !important;
  font-size: 0.9375rem !important;
  margin-top: 16px !important;
  letter-spacing: -0.01em !important;
}
.main-content dd {
  margin-left: 0 !important;
  padding: 8px 0 8px 16px !important;
  border-left: 3px solid var(--gi-accent-light) !important;
  color: var(--gi-text) !important;
  font-size: 0.875rem !important;
  margin-bottom: 4px !important;
}


/* ============================================================
   20. FOCUS-VISIBLE — keyboard accessibility
   ============================================================ */
:focus:not(:focus-visible) { outline: none !important; }
:focus-visible {
  outline: 2px solid var(--gi-accent) !important;
  outline-offset: 3px !important;
  border-radius: 4px !important;
}


/* ============================================================
   21. PRINT
   ============================================================ */
@media print {
  .side-bar,
  .site-header,
  .page-header,
  #main-header,
  .main-header,
  #back-to-top,
  .toc-wrap,
  .search-input-wrap { display: none !important; }

  body, html {
    background: #fff !important;
    background-image: none !important;
    color: #000 !important;
  }

  .main-content-wrap {
    margin-left: 0 !important;
    max-width: 100% !important;
  }

  .gi-card {
    box-shadow: none !important;
    backdrop-filter: none !important;
    border: 1px solid #ccc !important;
  }

  a { color: #000 !important; }

  .btn {
    border: 1px solid #999 !important;
    color: #000 !important;
    background: #fff !important;
    box-shadow: none !important;
  }
}

</style>

<script>
  /* Align Mermaid diagrams with the indigo design system.
     Just-the-Docs reads window.mermaidConfig before initialising mermaid. */
  window.mermaidConfig = {
    theme: 'base',
    themeVariables: {
      primaryColor:        '#eef2ff',
      primaryTextColor:    '#1e1b4b',
      primaryBorderColor:  '#6366f1',
      lineColor:           '#6b7280',
      secondaryColor:      '#f0f4ff',
      tertiaryColor:       '#e0e7ff',
      edgeLabelBackground: '#f0f4ff',
      clusterBkg:          'rgba(238, 242, 255, 0.70)',
      titleColor:          '#1e1b4b',
      fontFamily:          "'Inter', system-ui, sans-serif",
      fontSize:            '14px'
    }
  };
</script>
